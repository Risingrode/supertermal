<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>超级终端</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
  <link rel="apple-touch-icon" href="favicon-512.png">
  <script>
    (function () {
      var theme = localStorage.getItem('cc-web-theme') || 'dark';
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="vendor/xterm.min.css">
  <link rel="stylesheet" href="vendor/atom-one-dark.min.css">
</head>
<body>
  <!-- Login -->
  <div id="login-overlay" class="login-overlay">
    <div class="login-box">
      <div class="login-logo">ST</div>
      <h2>超级终端</h2>
      <p>Super Terminal</p>
      <form id="login-form">
        <input type="password" id="login-password" placeholder="输入密码" autocomplete="current-password" autofocus>
        <label class="remember-label">
          <input type="checkbox" id="remember-pw"> 记住密码
        </label>
        <button type="submit">登录</button>
      </form>
      <div id="login-error" class="login-error" hidden>密码错误</div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app" hidden>
    <!-- Hidden legacy chat UI -->
    <aside id="sidebar" class="sidebar" hidden aria-hidden="true">
      <div class="sidebar-header">
        <div class="new-chat-split">
          <button id="new-chat-btn" class="new-chat-btn">+ 新会话</button>
          <button id="new-chat-arrow" class="new-chat-arrow" title="更多">▾</button>
        </div>
        <div id="new-chat-dropdown" class="new-chat-dropdown" hidden>
          <button id="import-session-btn">导入本地 CLI 会话</button>
        </div>
      </div>
      <div id="session-list" class="session-list"></div>
      <div class="sidebar-footer">
        <button id="theme-btn" class="theme-btn" title="切换主题">🌓</button>
        <button id="settings-btn" class="settings-btn" title="设置">⚙</button>
        <span class="brand">超级终端</span>
      </div>
    </aside>

    <div id="sidebar-overlay" class="sidebar-overlay" hidden aria-hidden="true"></div>

    <!-- Content area -->
    <div class="content-area">
    <main class="chat-main" hidden aria-hidden="true">
      <header class="chat-header">
        <button id="menu-btn" class="menu-btn" title="菜单">☰</button>
        <span id="chat-title" class="chat-title">新会话</span>
        <button id="chat-agent-btn" class="chat-agent-btn" type="button" aria-haspopup="menu" aria-expanded="false">Claude</button>
        <div id="chat-agent-menu" class="chat-agent-menu" hidden>
          <button type="button" class="chat-agent-option active" data-agent="claude">Claude</button>
          <button type="button" class="chat-agent-option" data-agent="codex">Codex</button>
        </div>
        <span id="chat-runtime-state" class="chat-runtime-state" hidden>运行中</span>
        <span id="chat-cwd" class="chat-cwd" hidden></span>
        <select id="mode-select" class="mode-select" title="权限模式">
          <option value="yolo">YOLO</option>
          <option value="default">默认</option>
          <option value="plan">Plan</option>
        </select>
        <span id="cost-display" class="cost-display" hidden></span>
      </header>

      <div class="messages-wrap">
        <div id="messages" class="messages">
          <div class="welcome-msg">
            <div class="welcome-icon">✿</div>
            <h3>欢迎使用超级终端</h3>
            <p>开始与 Claude 对话</p>
          </div>
        </div>
        <div class="custom-scrollbar" id="custom-scrollbar">
          <div class="custom-scrollbar-thumb" id="custom-scrollbar-thumb"></div>
        </div>
      </div>

      <!-- Slash command menu -->
      <div id="cmd-menu" class="cmd-menu" hidden></div>

      <div class="input-area">
        <div id="attachment-tray" class="attachment-tray" hidden></div>
        <div class="input-wrapper">
          <input id="image-upload-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif" multiple hidden>
          <button id="attach-btn" class="attach-btn" title="上传图片" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-8.49 8.49a6 6 0 1 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
            </svg>
          </button>
          <textarea id="msg-input" rows="1" placeholder="输入消息… 输入 / 查看指令" autocomplete="off"></textarea>
          <button id="send-btn" class="send-btn" title="发送">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
          <button id="abort-btn" class="abort-btn" title="停止" hidden>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"></rect>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <!-- Terminal Panel -->
    <div id="terminal-panel" class="terminal-panel">
      <aside id="terminal-sidebar" class="terminal-sidebar">
        <div class="terminal-sidebar-header">
          <span class="terminal-sidebar-title">Hosts</span>
        </div>
        <div id="terminal-host-list" class="terminal-host-list"></div>
        <div class="terminal-sidebar-header terminal-sidebar-header-secondary">
          <span class="terminal-sidebar-title">终端</span>
          <button id="terminal-add-btn" class="terminal-add-btn" title="新建终端">+</button>
        </div>
        <div id="terminal-list" class="terminal-list"></div>
      </aside>
      <div id="terminal-sidebar-overlay" class="terminal-sidebar-overlay" hidden></div>
      <div class="terminal-main">
        <div class="terminal-toolbar">
          <button id="terminal-list-toggle-btn" class="terminal-list-toggle-btn" title="终端列表">☰</button>
          <div class="terminal-toolbar-copy">
            <div id="terminal-current-title" class="terminal-current-title">无终端</div>
            <div id="terminal-current-meta" class="terminal-current-meta">创建一个持久化终端开始使用</div>
          </div>
          <span class="terminal-toolbar-spacer"></span>
          <button id="terminal-settings-btn" class="terminal-settings-btn" title="设置">⚙</button>
        </div>
        <div id="terminal-empty-state" class="terminal-empty-state" hidden>
          <div class="terminal-empty-title">还没有终端</div>
          <div class="terminal-empty-copy">点击左上角的 <code>+</code> 创建一个持久化终端。</div>
        </div>
        <div id="terminal-container" class="terminal-container"></div>
        <input type="text" id="term-mobile-input" class="term-mobile-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <div id="term-mobile-bar" class="term-mobile-bar">
          <button class="tmb-btn" data-key="esc">ESC</button>
          <button class="tmb-btn" data-key="tab">TAB</button>
          <button class="tmb-btn" id="tmb-ctrl">CTRL</button>
          <span class="tmb-spacer"></span>
          <button class="tmb-btn" data-key="up">↑</button>
          <button class="tmb-btn" data-key="down">↓</button>
          <button class="tmb-btn" data-key="left">←</button>
          <button class="tmb-btn" data-key="right">→</button>
          <button class="tmb-btn tmb-kbd" id="tmb-kbd">⌨</button>
        </div>
      </div>
    </div>
    </div>
  </div>

  <div id="session-loading-overlay" class="session-loading-overlay" hidden aria-live="polite" aria-hidden="true">
    <div class="session-loading-card" role="status" aria-busy="true">
      <div class="session-loading-badge">Session</div>
      <div class="session-loading-title">会话加载中</div>
      <div id="session-loading-label" class="session-loading-label">正在整理消息与上下文…</div>
      <div class="session-loading-bar">
        <span class="session-loading-bar-fill"></span>
      </div>
    </div>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="vendor/xterm.min.js"></script>
  <script src="vendor/addon-fit.min.js"></script>
  <script src="vendor/xterm-addon-webgl.min.js"></script>
  <script src="terminal-attach-state.js"></script>
  <script src="terminal-input-guard.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/api.js"></script>
  <script src="app.js"></script>
</body>
</html>
